<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      /* Creates a proper responsive relative box inside the table cell */
      .video-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9; /* Maintains standard widescreen video shape */
      }
    </style>
  </head>
  <body>
    <table width="100%">
      <tr>
        <td>
          <div class="video-wrapper">
            <iframe src="https://www.dailymotion.com/embed/video/k67nR5sNMctK6BHNUam" 
                    style="position:absolute; width:100%; height:100%; border:0;" 
                    allowfullscreen="" 
                    allow="autoplay; fullscreen; picture-in-picture; remote-playback"></iframe>
          </div>
        </td>
      </tr>
      <tr>
        <td>
          <div class="video-wrapper">
            <iframe src="https://www.dailymotion.com/embed/video/k1e33rJt1GCzVlHNGvs" 
                    style="position:absolute; width:100%; height:100%; border:0;" 
                    allowfullscreen="" 
                    allow="autoplay; fullscreen; picture-in-picture; remote-playback"></iframe>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
