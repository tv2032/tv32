<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      .video-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
        cursor: pointer;
      }
      /* Styles the static thumbnail cover image */
      .video-cover {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        top: 0;
        left: 0;
      }
      /* Creates a simulated overlay play button */
      .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-family: sans-serif;
        border: 2px solid #fff;
        transition: background 0.2s, transform 0.2s;
        z-index: 2;
      }
      .video-wrapper:hover .play-btn {
        background: #ff0055; /* Changes color when user hovers */
        transform: translate(-50%, -50%) scale(1.1);
      }
    </style>
  </head>
  <body>
    <table width="100%">
      <tr>
        <td>
          <!-- Cover for Video 1 -->
          <div class="video-wrapper" onclick="loadVideo(this, 'k67nR5sNMctK6BHNUam')">
            <img class="video-cover" src="https://dailymotion.com" alt="Video Thumbnail">
            <div class="play-btn">&#9658;</div>
          </div>
        </td>
      </tr>
      <tr>
        <td>
          <!-- Cover for Video 2 -->
          <div class="video-wrapper" onclick="loadVideo(this, 'k1e33rJt1GCzVlHNGvs')">
            <img class="video-cover" src="https://dailymotion.com" alt="Video Thumbnail">
            <div class="play-btn">&#9658;</div>
          </div>
        </td>
      </tr>
    </table>

    <script>
      // Automatically replaces the thumbnail div with the actual interactive iframe when clicked
      function loadVideo(element, videoId) {
        element.innerHTML = `
          <iframe src="https://dailymotion.com{videoId}?autoplay=1" 
                  style="position:absolute; width:100%; height:100%; border:0;" 
                  allowfullscreen="" 
                  allow="autoplay; fullscreen; picture-in-picture; remote-playback">
          </iframe>`;
        // Removes the cursor pointer and click handler so it acts like a normal player
        element.style.cursor = 'default';
        element.removeAttribute('onclick');
      }
    </script>
  </body>
</html>
