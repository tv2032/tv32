<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .video-container {
      max-width: 800px; /* Limits the maximum width of the videos */
      margin: 0 auto;   /* Centers the container on the page */
      padding: 20px;
    }
    
    .video-wrapper {
      margin-bottom: 20px; /* Creates spacing between the two videos */
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9; /* Keeps the widescreen ratio */
      background-color: #000;
      cursor: pointer;
      overflow: hidden;
    }

    /* Thumbnail Styles */
    .video-thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }

    /* Play Button Overlay */
    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    /* Play Button Icon (SVG) */
    .play-button svg {
      width: 30px;
      height: 30px;
      fill: #fff;
      margin-left: 4px; /* Tiny adjustment to center the triangle optically */
    }

    /* Hover effect */
    .video-wrapper:hover .play-button {
      background: #0066dc; /* Dailymotion Brand Blue */
      transform: translate(-50%, -50%) scale(1.1);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <div class="video-container">
    
    <!-- Video 1 -->
    <div class="video-wrapper" onclick="loadVideo(this, 'k67nR5sNMctK6BHNUam')">
      <img class="video-thumbnail" src="https://www.dailymotion.com/thumbnail/video/k67nR5sNMctK6BHNUam" alt="Video Thumbnail">
      <div class="play-button">
        <svg viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
    </div>

    <!-- Video 2 -->
    <div class="video-wrapper" onclick="loadVideo(this, 'k1e33rJt1GCzVlHNGvs')">
      <img class="video-thumbnail" src="https://www.dailymotion.com/thumbnail/video/k1e33rJt1GCzVlHNGvs" alt="Video Thumbnail">
      <div class="play-button">
        <svg viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
    </div>

  </div>

  <script>
    function loadVideo(element, videoId) {
      // Create the Dailymotion iframe dynamically
      const iframe = document.createElement('iframe');
      iframe.setAttribute('src', `https://www.dailymotion.com/embed/video/${videoId}?autoplay=1`);
      iframe.setAttribute('allowfullscreen', 'true');
      iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture; remote-playback');

      // Clear the div and insert the iframe
      element.innerHTML = '';
      element.appendChild(iframe);
      
      // Remove the onclick event so it doesn't try to reload on subsequent clicks
      element.removeAttribute('onclick');
    }
  </script>

</body>
</html>
