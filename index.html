<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      .video-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #111; /* Dark sleek background for the video container */
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #333;
      }
      /* Creates a simulated overlay play button centered in your cell */
      .play-btn {
        width: 80px;
        height: 80px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-family: sans-serif;
        border: 3px solid #fff;
        transition: all 0.2s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      }
      .video-wrapper:hover .play-btn {
        background: #0066ff; /* Clean blue glow on hover */
        transform: scale(1.1);
      }
      /* Simple helper text beneath the button */
      .play-text {
        position: absolute;
        bottom: 15px;
        color: #aaa;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }
    </style>
  </head>
  <body>

    <table width="100%" cellspacing="10">
      <tr>
        <td>
          <!-- Container for Video 1 -->
          <div class="video-wrapper" onclick="loadVideo(this, 'k67nR5sNMctK6BHNUam')">
            <div class="play-btn">&#9658;</div>
            <div class="play-text">Click to Load Video 1</div>
          </div>
        </td>
      </tr>
      <tr>
        <td>
          <!-- Container for Video 2 -->
          <div class="video-wrapper" onclick="loadVideo(this, 'k1e33rJt1GCzVlHNGvs')">
            <div class="play-btn">&#9658;</div>
            <div class="play-text">Click to Load Video 2</div>
          </div>
        </td>
      </tr>
    </table>

    <script>
      // Instantly injects the clean, non-autoplayable Dailymotion frame upon click
      function loadVideo(element, videoId) {
        element.innerHTML = `
          <iframe src="https://dailymotion.com{videoId}?autoplay=1" 
                  style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" 
                  allowfullscreen="" 
                  allow="autoplay; fullscreen; picture-in-picture; remote-playback">
          </iframe>`;
        element.style.cursor = 'default';
        element.removeAttribute('onclick');
      }
    </script>
  </body>
</html>
