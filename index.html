

  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .video-container {
      max-width: 800px; /* Limits the maximum width of the videos */
      margin: 0 auto;   /* Centers the container on the page */
      padding: 20px;
    }
    
    .video-wrapper {
      margin-bottom: 20px; /* Creates spacing between the two videos */
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9; /* Keeps the widescreen ratio */
      background-color: #000;
      cursor: pointer;
      overflow: hidden;
    }

    /* Thumbnail Styles */
    .video-thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }

    /* Play Button Overlay */
    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    /* Play Button Icon (SVG) */
    .play-button svg {
      width: 30px;
      height: 30px;
      fill: #fff;
      margin-left: 4px; /* Tiny adjustment to center the triangle optically */
    }

    /* Hover effect */
    .video-wrapper:hover .play-button {
      background: #0066dc; /* Dailymotion Brand Blue */
      transform: translate(-50%, -50%) scale(1.1);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
