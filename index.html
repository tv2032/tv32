<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .video-container {
      max-width: 800px; /* Limits the maximum width of the videos */
      margin: 0 auto;   /* Centers the container on the page */
      padding: 20px;
    }
    
    .video-wrapper {
      margin-bottom: 20px; /* Creates spacing between the two videos */
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9; /* Keeps the video in a perfect widescreen ratio */
      border: 0;
    }
  </style>
</head>
<body>

  <div class="video-container">
    
    <div class="video-wrapper">
      <!-- Added ?queue-autoplay-next=0 and removed 'autoplay' from the allow attribute -->
      <iframe src="https://www.dailymotion.com/embed/video/k67nR5sNMctK6BHNUam?queue-autoplay-next=0" 
              allowfullscreen 
              allow="fullscreen; picture-in-picture; remote-playback"></iframe>
    </div>

    <div class="video-wrapper">
      <!-- Added ?queue-autoplay-next=0 and removed 'autoplay' from the allow attribute -->
      <iframe src="https://www.dailymotion.com/embed/video/k1e33rJt1GCzVlHNGvs?queue-autoplay-next=0" 
              allowfullscreen 
              allow="fullscreen; picture-in-picture; remote-playback"></iframe>
    </div>

  </div>

</body>
</html>
